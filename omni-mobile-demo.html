<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Omni-Lox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg:       #f2f4f7;
  --bg2:      #ffffff;
  --bg3:      #f8f9fb;
  --line:     #e4e8ee;
  --line2:    #d0d7e2;
  --text:     #1a2130;
  --dim:      #7a8fa8;
  --green:    #1a9e5c;
  --green-bg: #eaf7f1;
  --amber:    #d97706;
  --amber-bg: #fff8ec;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --blue:     #2563eb;
  --blue-bg:  #eff4ff;
  --off:      #94a3b8;
  --off-bg:   #f1f5f9;
  --header-h: 88px;
  --bar-h:    56px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html {
  background: #1a2130;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 393px;
  min-height: 852px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ── STATUS BAR NOTCH AREA ── */
.notch-bar {
  height: 54px;
  background: #fff;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 24px 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid var(--line);
}
.notch-time {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 16px;
}
.notch-icons {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
}

/* ── HEADER ── */
.header {
  background: #fff;
  padding: 14px 20px 16px;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 54px;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.5px;
  color: var(--text);
}
.logo span { color: var(--green); }
.live-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--green-bg);
  border: 1px solid rgba(26,158,92,.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--green);
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* summary strip */
.summary {
  display: flex;
  gap: 0;
}
.sum-item {
  flex: 1;
  text-align: center;
  padding: 6px 4px;
  border-right: 1px solid var(--line);
}
.sum-item:last-child { border-right: none; }
.sum-val {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1;
}
.sum-val.green { color: var(--green); }
.sum-val.amber { color: var(--amber); }
.sum-val.red   { color: var(--red); }
.sum-key {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── SCROLL AREA ── */
.scroll-area {
  padding: 16px 14px 100px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ── MACHINE GRID 2 cols ── */
.machine-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

/* ── MACHINE CARD ── */
.card {
  background: var(--bg2);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
  border: 1px solid var(--line);
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  transform: scale(0.97);
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.card.editing {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(37,99,235,.2);
}

.card-top {
  padding: 12px 12px 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* status indicator */
.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.status-dot-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
}
.sdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sdot.ok    { background: var(--green); box-shadow: 0 0 5px rgba(26,158,92,.4); }
.sdot.warn  { background: var(--amber); box-shadow: 0 0 5px rgba(217,119,6,.4); }
.sdot.fault { background: var(--red);   box-shadow: 0 0 5px rgba(220,38,38,.4); animation: blink .9s steps(1) infinite; }
.sdot.off   { background: var(--off); }
@keyframes blink { 50%{opacity:0;} }

.status-text {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.status-text.ok    { color: var(--green); }
.status-text.warn  { color: var(--amber); }
.status-text.fault { color: var(--red); }
.status-text.off   { color: var(--off); }

.machine-id-badge {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--dim);
  font-weight: 600;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 2px 5px;
}

/* name */
.name-wrap { min-height: 36px; display: flex; align-items: center; }
.machine-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: 0.3px;
  border-radius: 4px;
  padding: 2px 4px;
  margin: -2px -4px;
  width: 100%;
  transition: background .15s;
}
.machine-name:hover { background: var(--bg3); }
.name-input {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  background: var(--blue-bg);
  border: 1.5px solid var(--blue);
  border-radius: 6px;
  padding: 3px 7px;
  outline: none;
  width: 100%;
  display: none;
  letter-spacing: 0.3px;
}

/* metrics */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border-top: 1px solid var(--line);
  margin-top: 10px;
}
.metric {
  background: var(--bg2);
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.metric-val {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 16px;
  line-height: 1;
  color: var(--text);
}
.metric-val.ok    { color: var(--green); }
.metric-val.warn  { color: var(--amber); }
.metric-val.fault { color: var(--red); }
.metric-val.dim   { color: var(--off); }
.metric-key {
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--dim);
  text-transform: uppercase;
}

/* edit actions */
.card-actions {
  padding: 8px 10px;
  display: none;
  gap: 6px;
  border-top: 1px solid var(--line);
  background: var(--bg3);
}
.card-actions.show { display: flex; }
.act-btn {
  flex: 1;
  height: 30px;
  border-radius: 7px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: filter .15s;
}
.act-save {
  background: var(--green);
  color: #fff;
}
.act-cancel {
  background: var(--line);
  color: var(--dim);
}
.act-btn:active { filter: brightness(.92); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 393px;
  height: 82px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.nav-icon { color: var(--dim); transition: color .15s; }
.nav-item.active .nav-icon { color: var(--green); }
.nav-label {
  font-size: 9px;
  letter-spacing: 0.5px;
  color: var(--dim);
  font-weight: 500;
}
.nav-item.active .nav-label { color: var(--green); font-weight: 700; }

/* toast */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a2130;
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 11px 20px;
  border-radius: 22px;
  white-space: nowrap;
  opacity: 0;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<!-- iOS STATUS BAR -->
<div class="notch-bar">
  <div class="notch-time" id="notchTime">9:41</div>
  <div class="notch-icons">
    <!-- signal bars -->
    <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
      <rect x="0" y="8" width="3" height="4" rx="1"/>
      <rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/>
      <rect x="9" y="3" width="3" height="9" rx="1"/>
      <rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3"/>
    </svg>
    <!-- wifi -->
    <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M2 7c2.7-2.7 6.4-4.4 10-4.4s7.3 1.7 10 4.4"/>
      <path d="M5.5 10.5c1.8-1.8 4.1-2.9 6.5-2.9s4.7 1.1 6.5 2.9"/>
      <path d="M9.5 14c.7-.7 1.6-1.1 2.5-1.1s1.8.4 2.5 1.1"/>
      <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
    </svg>
    <!-- battery -->
    <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor">
      <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <rect x="1.5" y="2.5" width="16" height="7" rx="1.5"/>
      <path d="M22 4v4a2 2 0 0 0 0-4z"/>
    </svg>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">OMNI<span>·</span>LOX</div>
    <div class="live-pill">
      <div class="live-dot"></div>LIVE
    </div>
  </div>
  <div class="summary" id="summary"></div>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area">
  <div class="section-label">Production Line — Site A</div>
  <div class="machine-grid" id="grid"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active">
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <div class="nav-label">Overview</div>
  </div>
  <div class="nav-item">
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <div class="nav-label">Trends</div>
  </div>
  <div class="nav-item">
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <div class="nav-label">Alarms</div>
  </div>
  <div class="nav-item">
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    <div class="nav-label">Config</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-10"/></svg>
  <span id="toastMsg">Saved</span>
</div>

<script>
// ── CLOCK ──
function tick() {
  const now = new Date();
  document.getElementById('notchTime').textContent =
    now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
tick(); setInterval(tick, 10000);

// ── DATA ──
const DEFAULTS = [
  { id:'SLC-01', name:'Line 1 Entry',    status:'ok',    bars:'4/4', hv:'7.2kV', temp:'36°C', uptime:'124h' },
  { id:'SLC-02', name:'Line 1 Exit',     status:'warn',  bars:'3/4', hv:'6.1kV', temp:'41°C', uptime:'87h'  },
  { id:'SLC-03', name:'Winding Stn A',   status:'ok',    bars:'4/4', hv:'7.0kV', temp:'38°C', uptime:'203h' },
  { id:'SLC-04', name:'Conveyor Exit',   status:'fault', bars:'1/4', hv:'2.1kV', temp:'54°C', uptime:'12h'  },
  { id:'SLC-05', name:'Print Entry',     status:'ok',    bars:'4/4', hv:'7.1kV', temp:'37°C', uptime:'98h'  },
  { id:'SLC-06', name:'Laminator In',    status:'off',   bars:'--',  hv:'--',    temp:'--',   uptime:'--'   },
];

function load() {
  try {
    const s = localStorage.getItem('omni-mobile-machines');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return DEFAULTS.map(m => ({...m}));
}
function save(machines) {
  try { localStorage.setItem('omni-mobile-machines', JSON.stringify(machines)); } catch(e) {}
}

let machines = load();
let editing = -1;

// ── SUMMARY ──
function renderSummary() {
  const ok    = machines.filter(m => m.status === 'ok').length;
  const warn  = machines.filter(m => m.status === 'warn').length;
  const fault = machines.filter(m => m.status === 'fault').length;
  const off   = machines.filter(m => m.status === 'off').length;
  document.getElementById('summary').innerHTML = `
    <div class="sum-item"><div class="sum-val green">${ok}</div><div class="sum-key">Normal</div></div>
    <div class="sum-item"><div class="sum-val amber">${warn}</div><div class="sum-key">Warning</div></div>
    <div class="sum-item"><div class="sum-val red">${fault}</div><div class="sum-key">Fault</div></div>
    <div class="sum-item"><div class="sum-val" style="color:var(--off)">${off}</div><div class="sum-key">Offline</div></div>
  `;
}

// ── RENDER ──
function render() {
  renderSummary();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  machines.forEach((m, idx) => {
    const isEditing = editing === idx;
    const sc = m.status;
    const barsClass = sc === 'fault' ? 'fault' : sc === 'warn' ? 'warn' : sc === 'off' ? 'dim' : 'ok';

    const card = document.createElement('div');
    card.className = 'card' + (isEditing ? ' editing' : '');
    card.innerHTML = `
      <div class="card-top">
        <div class="status-row">
          <div class="status-dot-wrap">
            <div class="sdot ${sc}"></div>
            <div class="status-text ${sc}">${sc.toUpperCase()}</div>
          </div>
          <div class="machine-id-badge">${m.id}</div>
        </div>
        <div class="name-wrap">
          <div class="machine-name" id="disp-${idx}"
            style="display:${isEditing?'none':'block'}"
            onclick="startEdit(${idx})">${m.name}</div>
          <input class="name-input" id="input-${idx}"
            style="display:${isEditing?'block':'none'}"
            value="${m.name}"
            onkeydown="handleKey(event,${idx})">
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-val ${barsClass}">${m.bars}</div>
          <div class="metric-key">Bars</div>
        </div>
        <div class="metric">
          <div class="metric-val ${sc==='off'?'dim':''}">${m.hv}</div>
          <div class="metric-key">HV Out</div>
        </div>
        <div class="metric">
          <div class="metric-val ${sc==='fault'?'fault':''}">${m.temp}</div>
          <div class="metric-key">Temp</div>
        </div>
        <div class="metric">
          <div class="metric-val dim">${m.uptime}</div>
          <div class="metric-key">Uptime</div>
        </div>
      </div>
      <div class="card-actions ${isEditing?'show':''}">
        <button class="act-btn act-cancel" onclick="cancelEdit(${idx})">Cancel</button>
        <button class="act-btn act-save" onclick="confirmEdit(${idx})">Save</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── EDIT ──
function startEdit(idx) {
  editing = idx;
  render();
  setTimeout(() => {
    const inp = document.getElementById(`input-${idx}`);
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

function cancelEdit(idx) {
  editing = -1;
  render();
}

function confirmEdit(idx) {
  const inp = document.getElementById(`input-${idx}`);
  const val = inp ? inp.value.trim() : '';
  if (!val) return;
  machines[idx].name = val;
  machines[idx].lastEdit = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  save(machines);
  editing = -1;
  render();
  showToast(`"${val}" saved`);
}

function handleKey(e, idx) {
  if (e.key === 'Enter') confirmEdit(idx);
  if (e.key === 'Escape') cancelEdit(idx);
}

// ── TOAST ──
let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── NAV (demo only) ──
document.querySelectorAll('.nav-item').forEach((el, i) => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  });
});

render();
</script>
</body>
</html>
